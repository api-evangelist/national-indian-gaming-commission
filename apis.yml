aid: national-indian-gaming-commission
name: National Indian Gaming Commission
description: >-
  The National Indian Gaming Commission (NIGC) is an independent federal
  regulatory agency that regulates gaming on Indian lands to protect tribal
  gaming as a means of generating revenue for tribal governments. The agency
  publishes online resources, public records, and gaming-related data through
  its website but does not currently expose a public web API.
